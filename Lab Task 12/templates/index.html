<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking Prediction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2b1055,#6a11cb,#8e2de2);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:95%;
    max-width:1200px;
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(12px);
    padding:35px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    color:white;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:55px;
    font-weight:700;
}

.title p{
    color:#e5d4ff;
    font-size:20px;
    margin-top:10px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.card h2{
    margin-bottom:25px;
    font-size:28px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:15px;
    color:#f1e8ff;
}

input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f3e8ff;
    font-size:15px;
    outline:none;
}

input[type=range]{
    accent-color:#ff66d9;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff4fd8,#9b5cff);
    color:white;
    font-size:22px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:28px;
    color:#ffe066;
    font-weight:700;
}

@media(max-width:900px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .title h1{
        font-size:35px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="title">
    <h1>🏨 Hotel Booking Prediction 💜</h1>
    <p>AI Powered Hotel Prediction System</p>
</div>

```html
<form action="/predict" method="POST">

<div class="form-grid">

<!-- LEFT CARD -->
<div class="card">

<h2>📅 Booking Info</h2>

<div class="input-group">
<label>Hotel</label>
<select name="hotel">
<option>Resort Hotel</option>
<option>City Hotel</option>
</select>
</div>

<div class="input-group">
<label>Lead Time</label>
<input type="number" name="lead_time">
</div>

<div class="input-group">
<label>Arrival Year</label>
<input type="number" name="arrival_date_year">
</div>

<div class="input-group">
<label>Arrival Month</label>
<select name="arrival_date_month">
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>
</div>

<div class="input-group">
<label>Week Number</label>
<input type="number" name="arrival_date_week_number">
</div>

<div class="input-group">
<label>Day Of Month</label>
<input type="number" name="arrival_date_day_of_month">
</div>

<div class="input-group">
<label>Meal</label>
<select name="meal">
<option>BB</option>
<option>HB</option>
<option>FB</option>
<option>SC</option>
</select>
</div>

<div class="input-group">
<label>Country</label>
<input type="text" name="country" value="PRT">
</div>

<div class="input-group">
<label>Market Segment</label>
<select name="market_segment">
<option>Online TA</option>
<option>Offline TA/TO</option>
<option>Direct</option>
<option>Corporate</option>
</select>
</div>

<div class="input-group">
<label>Distribution Channel</label>
<select name="distribution_channel">
<option>TA/TO</option>
<option>Direct</option>
<option>Corporate</option>
<option>GDS</option>
</select>
</div>

<div class="input-group">
<label>Deposit Type</label>
<select name="deposit_type">
<option>No Deposit</option>
<option>Non Refund</option>
<option>Refundable</option>
</select>
</div>

</div>

<!-- RIGHT CARD -->
<div class="card">

<h2>👨‍👩‍👧 Guest Info</h2>

<div class="input-group">
<label>Adults</label>
<input type="number" name="adults">
</div>

<div class="input-group">
<label>Children</label>
<input type="number" name="children">
</div>

<div class="input-group">
<label>Babies</label>
<input type="number" name="babies">
</div>

<div class="input-group">
<label>Weekend Nights</label>
<input type="number" name="stays_in_weekend_nights">
</div>

<div class="input-group">
<label>Week Nights</label>
<input type="number" name="stays_in_week_nights">
</div>

<div class="input-group">
<label>Repeated Guest</label>
<select name="is_repeated_guest">
<option value="0">0</option>
<option value="1">1</option>
</select>
</div>

<div class="input-group">
<label>Previous Cancellations</label>
<input type="number" name="previous_cancellations">
</div>

<div class="input-group">
<label>Previous Not Cancelled</label>
<input type="number" name="previous_bookings_not_canceled">
</div>

<div class="input-group">
<label>Reserved Room Type</label>
<select name="reserved_room_type">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
</select>
</div>

<div class="input-group">
<label>Assigned Room Type</label>
<select name="assigned_room_type">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
</select>
</div>

<div class="input-group">
<label>Booking Changes</label>
<input type="number" name="booking_changes">
</div>

<div class="input-group">
<label>Waiting Days</label>
<input type="number" name="days_in_waiting_list">
</div>

<div class="input-group">
<label>Customer Type</label>
<select name="customer_type">
<option>Transient</option>
<option>Contract</option>
<option>Group</option>
<option>Transient-Party</option>
</select>
</div>

<div class="input-group">
<label>ADR</label>
<input type="number" step="0.01" name="adr">
</div>

<div class="input-group">
<label>Parking Spaces</label>
<input type="number" name="required_car_parking_spaces">
</div>

<div class="input-group">
<label>Special Requests</label>
<input type="number" name="total_of_special_requests">
</div>

</div>

</div>

<button type="submit">✨ Predict ✨</button>

<div class="result">
{{ prediction_text }}
</div>

</form>
```

</div>

</body>
</html>
